<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ayham 3D Elite</title>

<style>
body {
margin: 0;
overflow: hidden;
background: black;
font-family: Arial;
}

#ui {
position: absolute;
top: 50%;
left: 50%;
transform: translate(-50%, -50%);
color: white;
text-align: center;
z-index: 10;
}

h1 {
font-size: 50px;
text-shadow: 0 0 20px #ff174f;
}

p {
opacity: 0.7;
}

button {
margin-top: 20px;
padding: 12px 30px;
border: none;
border-radius: 12px;
background: #ff174f;
color: white;
font-weight: bold;
cursor: pointer;
transition: 0.3s;
}

button:hover {
transform: scale(1.1);
box-shadow: 0 0 30px #ff174f;
}
</style>
</head>

<body>

<div id="ui">
<h1>AYHAM 3D ELITE</h1>
<p>Welcome to next level experience</p>
<button onclick="alert('System Activated 🔥')">ENTER SYSTEM</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
// Scene
const scene = new THREE.Scene();

// Camera
const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth / window.innerHeight,
0.1,
1000
);

camera.position.z = 5;

// Renderer
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// Objects (3D cubes)
const geometry = new THREE.BoxGeometry();
const material = new THREE.MeshStandardMaterial({ color: 0xff174f });

const cubes = [];

for(let i=0;i<20;i++){
const cube = new THREE.Mesh(geometry, material);
cube.position.x = (Math.random()-0.5)*10;
cube.position.y = (Math.random()-0.5)*10;
cube.position.z = (Math.random()-0.5)*10;
scene.add(cube);
cubes.push(cube);
}

// Light
const light = new THREE.PointLight(0xffffff, 1);
light.position.set(5,5,5);
scene.add(light);

// Animation
function animate(){
requestAnimationFrame(animate);

cubes.forEach(c=>{
c.rotation.x += 0.01;
c.rotation.y += 0.01;
});

renderer.render(scene, camera);
}

animate();

// Mouse movement effect
document.addEventListener("mousemove", (e)=>{
camera.position.x = (e.clientX / window.innerWidth - 0.5) * 2;
camera.position.y = -(e.clientY / window.innerHeight - 0.5) * 2;
});
</script>

</body>
</html>
