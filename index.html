<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Athlead Clone</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter',sans-serif;
}

body{
    background:#050505;
    color:#fff;
    overflow-x:hidden;
}

body::before{
    content:"";
    position:fixed;
    inset:0;
    background:
    radial-gradient(circle at top right,
    rgba(255,0,60,.25),
    transparent 40%);
    pointer-events:none;
}

.grid{
    position:fixed;
    inset:0;
    background-image:
    linear-gradient(rgba(255,255,255,.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.04) 1px, transparent 1px);
    background-size:60px 60px;
    z-index:-1;
}

.container{
    width:min(1100px,90%);
    margin:auto;
}

header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:25px 0;
}

.logo{
    display:flex;
    align-items:center;
    gap:12px;
}

.logo-box{
    width:55px;
    height:55px;
    border-radius:16px;
    background:#d4002a;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:32px;
    font-weight:900;
}

.logo h2{
    font-size:30px;
}

.logo span{
    color:#999;
    font-size:18px;
}

.actions{
    display:flex;
    gap:15px;
}

.btn{
    text-decoration:none;
    color:white;
    padding:14px 28px;
    border-radius:16px;
    font-weight:700;
}

.btn-red{
    background:#d80032;
    box-shadow:0 0 25px rgba(255,0,70,.45);
}

.btn-dark{
    border:1px solid #333;
    background:#111;
}

.hero{
    min-height:85vh;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
}

.tags{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:15px;
    margin-bottom:40px;
}

.tag{
    padding:12px 22px;
    border:1px solid #2b2b2b;
    border-radius:999px;
    color:#ccc;
    background:#101010;
}

.hero h1{
    font-size:clamp(55px,8vw,105px);
    line-height:1;
    font-weight:900;
    margin-bottom:30px;
}

.hero h1 span{
    color:#ff174f;
}

.hero p{
    max-width:850px;
    margin:auto;
    color:#cfcfcf;
    font-size:22px;
    line-height:1.8;
}

.buttons{
    margin-top:50px;
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:20px;
}
